# marlocarlo/psmux: Tmux on Windows Powershell - tmux for PowerShell, Windows Terminal, cmd.exe. Includes psmux, pmux, and tmux commands. This is native Powershell Tmux designed for Windows in Rust 🦀 https://github.com/marlocarlo/psmux
# tmux(1) - OpenBSD manual pages https://man.openbsd.org/OpenBSD-current/man1/tmux.1

set -g base-index 1
set -g status-position top

# psmux does not apply this if empty.
set -g status-left '⁠'
set -g status-right ''

set -g window-status-current-format "#{window_index}:#{pane_title}"
set -g window-status-format "#{window_index}:#{=/-16/…/:pane_title}"

set -g status-style "fg=white,bg=black"
set -g window-status-last-style "fg=white,bg=black"
set -g window-status-current-style "fg=black,bg=brightcyan"
