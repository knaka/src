[vars]
# Releases · msys2/msys2-installer https://github.com/msys2/msys2-installer/releases
msys2_version = "2026-06-11"

# Releases · msys2/msys2-installer https://github.com/msys2/msys2-installer/releases
[tools."http:msys2"]
os = ["windows"]
version = "{{ vars.msys2_version }}"
bin_path = "msys64/usr/bin"
# “version” cannot be filtered as tera template.
url = 'https://github.com/msys2/msys2-installer/releases/download/{{ version }}/msys2-base-{{ arch(x64="x86_64") }}-{{ vars.msys2_version | replace(from="-", to="") }}.tar.zst'
platforms.windows-amd64 = { checksum = "sha256:ace898d250d7302a24259a0288d69354649365af9cc64c8bcc2f219bc1e28374" }
